<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html,css">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Profile card</title>

  <link rel="stylesheet" href="src/css/style.css">

</head>
<body>

  <main class="container">

    <section class="container_bg top"></section>

    <section class="card">

      <section class="card_content">

        <article class="card_profile">

          <img src="src/images/image-victor.jpg" alt="" class="card_profile_img">

          <span class="card_profile_info">

            <span class="name">Victor Crest</span>
        
            <span class="years-old">26</span>

          </span>

          <span class="local">London</span>

        </article>

      </section>

      <article class="card_data">

        <article class="data_item">

          <span class="data_item_number">80K</span>

          <span class="data_item_desc">Followers</span>

        </article>

        <article class="data_item">

          <span class="data_item_number">803K</span>

          <span class="data_item_desc">Likes</span>

        </article>

        <article class="data_item">

          <span class="data_item_number">1.4K</span>

          <span class="data_item_desc">Photos</span>

        </article>

      </article>

    </section>

    <section class="container_bg bottom"></section>

  </main>

</body>
</html>
